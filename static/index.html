<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404: This page could not be found</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .error-box {
      border: 1px solid #eaeaea;
      border-radius: 4px;
      padding: 24px 32px;
      max-width: 500px;
      width: 100%;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .error-title span {
      font-weight: 400;
    }
    .error-detail {
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
    }
    .error-detail code {
      font-family: Menlo, Monaco, "Lucida Console", "Courier New", monospace;
      font-size: 13px;
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #eaeaea;
    }
    .docs-link {
      border: 1px solid #0070f3;
      border-radius: 4px;
      padding: 16px 32px;
      max-width: 500px;
      width: 100%;
      text-align: left;
    }
    .docs-link a {
      color: #0070f3;
      text-decoration: none;
      font-size: 14px;
    }
    .docs-link a:hover {
      text-decoration: underline;
    }
    /* Hidden input styling */
    .hidden-input {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: default;
      z-index: 10;
      border: none;
      outline: none;
      background: transparent;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-title">404: <span>NOT_FOUND</span></div>
    <div class="error-detail">Code: <code>NOT_FOUND</code></div>
    <div class="error-detail">ID: <code>sfo1::zxgrc-1772307396187-eadc3218e688</code></div>
  </div>
  <div class="docs-link">
    <a href="https://vercel.com/docs/errors" target="_blank" rel="noopener noreferrer">Read our documentation to learn more about this error.</a>
  </div>

  <input 
    type="text" 
    class="hidden-input" 
    id="secretInput" 
    autocomplete="off" 
    autofocus
    aria-label="Enter access code"
  />

  <script>
    (function() {
      var buffer = '';
      var trigger = 'code';
      var secretCode = 'UN8L0CK3D';
      var input = document.getElementById('secretInput');

      // Keep focus on the hidden input
      document.addEventListener('click', function() {
        input.focus();
      });
      input.focus();

      input.addEventListener('input', function() {
        buffer = input.value.toLowerCase();
        
        // Check if they typed "code"
        if (buffer === trigger) {
          input.value = '';
          buffer = '';
          var code = prompt('Enter the access code:');
          if (code === secretCode) {
            sessionStorage.setItem('doge_access', 'granted');
            window.location.href = '/home';
          } else {
            // Wrong code - do nothing, stay on the 404 page
          }
        }
        
        // Reset if buffer gets too long
        if (buffer.length > trigger.length) {
          input.value = '';
          buffer = '';
        }
      });
    })();
  </script>
</body>
</html>
